name: reliefnet
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  provider: ^6.1.2
  shared_preferences: ^2.5.2
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.0
  cloud_firestore: ^5.6.0
  firebase_core: ^3.10.0
  firebase_app_check: ^0.3.2+10
  firebase_storage: ^12.4.0
  firebase_auth: ^5.4.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  http: ^1.2.0
  google_sign_in: ^6.2.1
  package_info_plus: ^8.3.1
  share_plus: ^10.1.4
  path: ^1.9.0
  file_picker: ^11.0.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_map_heatmap: ^0.0.7
  google_generative_ai: ^0.4.6
  intl: ^0.20.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.2.11
  lottie: ^3.1.0
  flutter_localizations:
    sdk: flutter

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  flutter_local_notifications: ^22.0.0
  firebase_messaging: ^15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/google.png
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
flutter_native_splash:
  color: "#000000"
  image: assets/images/splash.png
  android_12:
    color: "#000000"
    image: assets/images/splash.png